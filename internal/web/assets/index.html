<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VPN PANEL</title>
  <link rel="stylesheet" href="/static/assets/static/styles.css">
</head>

<body>
  <div class="header">
    <div>
      <div class="title">VPN PANEL</div>
      <div class="sub">WIREGUARD · LIVE STATS · TRAFFIC HISTORY</div>
    </div>
    <div class="range" role="group" aria-label="Traffic range">
      <button class="range-btn active" data-range="6h">6H</button>
      <button class="range-btn" data-range="24h">24H</button>
      <button class="range-btn" data-range="168h">7D</button>
      <button class="range-btn" data-range="720h">30D</button>
    </div>
  </div>

  <main class="layout">
    <section class="panel">
      <div class="section-head">
        <div class="section-title">Peers</div>
        <div id="peer-count" class="section-meta">0</div>
      </div>
      <div id="list" class="list"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <div class="section-title">Traffic</div>
          <div id="selected-key" class="section-meta">Select a peer</div>
        </div>
      </div>

      <div class="totals">
        <div>
          <div class="label">RX</div>
          <div id="history-rx" class="metric">0 B</div>
        </div>
        <div>
          <div class="label">TX</div>
          <div id="history-tx" class="metric">0 B</div>
        </div>
      </div>

      <div id="chart" class="chart empty">No traffic history yet</div>
    </section>
  </main>

  <script>
    let selectedPublicKey = '';
    let selectedRange = '6h';
    let peersCache = [];

    document.querySelectorAll('.range-btn').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.range-btn').forEach(el => el.classList.remove('active'));
        button.classList.add('active');
        selectedRange = button.dataset.range;
        loadTraffic();
      });
    });

    async function load() {
      const res = await fetch('/api/peers');
      const data = await res.json();
      peersCache = data;

      if (!selectedPublicKey && data.length > 0) {
        selectedPublicKey = data[0].public_key;
        loadTraffic();
      }

      renderPeers(data);
    }

    function renderPeers(data) {
      const list = document.getElementById('list');
      const count = document.getElementById('peer-count');
      list.innerHTML = '';
      count.textContent = String(data.length);

      data.forEach(p => {
        const status = getStatus(p.last_handshake);
        const row = document.createElement('button');
        row.className = `row ${status}`;
        row.type = 'button';
        row.dataset.publicKey = p.public_key;
        if (p.public_key === selectedPublicKey) {
          row.classList.add('selected');
        }

        row.appendChild(statusBar(status));
        row.appendChild(column('PUBLIC KEY', shortKey(p.public_key), 'key'));
        row.appendChild(column('RX', formatBytes(p.rx_bytes)));
        row.appendChild(column('TX', formatBytes(p.tx_bytes)));
        row.appendChild(column('STATUS', status.toUpperCase(), 'right status-text'));

        row.addEventListener('click', () => {
          selectedPublicKey = p.public_key;
          renderPeers(peersCache);
          loadTraffic();
        });

        list.appendChild(row);
      });
    }

    async function loadTraffic() {
      const selectedKey = document.getElementById('selected-key');
      const chart = document.getElementById('chart');

      if (!selectedPublicKey) {
        selectedKey.textContent = 'Select a peer';
        chart.className = 'chart empty';
        chart.textContent = 'No peer selected';
        return;
      }

      selectedKey.textContent = shortKey(selectedPublicKey, 42);
      chart.className = 'chart empty';
      chart.textContent = 'Loading...';

      const params = new URLSearchParams({
        public_key: selectedPublicKey,
        range: selectedRange
      });

      const res = await fetch(`/api/traffic?${params}`);
      if (!res.ok) {
        chart.textContent = 'Could not load traffic history';
        return;
      }

      const history = await res.json();
      document.getElementById('history-rx').textContent = formatBytes(history.rx_bytes);
      document.getElementById('history-tx').textContent = formatBytes(history.tx_bytes);
      renderChart(history.points || []);
    }

    function renderChart(points) {
      const chart = document.getElementById('chart');
      chart.innerHTML = '';

      if (points.length === 0) {
        chart.className = 'chart empty';
        chart.textContent = 'No traffic history yet';
        return;
      }

      chart.className = 'chart';

      const width = 720;
      const height = 260;
      const pad = 28;
      const values = points.map(p => Number(p.rx_bytes || 0) + Number(p.tx_bytes || 0));
      const max = Math.max(...values, 1);
      const step = points.length > 1 ? (width - pad * 2) / (points.length - 1) : 0;

      const polyline = values.map((value, i) => {
        const x = pad + i * step;
        const y = height - pad - (value / max) * (height - pad * 2);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');

      const bars = points.map((point, i) => {
        const value = values[i];
        const x = pad + i * step;
        const barHeight = Math.max(2, (value / max) * (height - pad * 2));
        const y = height - pad - barHeight;
        return `<rect x="${(x - 2).toFixed(1)}" y="${y.toFixed(1)}" width="4" height="${barHeight.toFixed(1)}"></rect>`;
      }).join('');

      chart.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Traffic history chart">
          <line class="axis" x1="${pad}" y1="${height - pad}" x2="${width - pad}" y2="${height - pad}"></line>
          <line class="axis" x1="${pad}" y1="${pad}" x2="${pad}" y2="${height - pad}"></line>
          <g class="bars">${bars}</g>
          <polyline class="line" points="${polyline}"></polyline>
        </svg>
        <div class="chart-meta">
          <span>${points.length} buckets</span>
          <span>Peak ${formatBytes(max)}</span>
        </div>
      `;
    }

    function statusBar(status) {
      const el = document.createElement('span');
      el.className = `status-bar ${status}`;
      return el;
    }

    function column(label, value, extraClass = '') {
      const col = document.createElement('span');
      col.className = `col ${extraClass}`.trim();

      const labelEl = document.createElement('span');
      labelEl.className = 'label';
      labelEl.textContent = label;

      const valueEl = document.createElement('span');
      valueEl.className = 'value';
      valueEl.textContent = value;

      col.appendChild(labelEl);
      col.appendChild(valueEl);
      return col;
    }

    function getStatus(lastHandshake) {
      if (!lastHandshake) return 'offline';

      const t = new Date(lastHandshake).getTime();
      if (isNaN(t)) return 'offline';

      const diff = Date.now() - t;
      return diff < 60000 ? 'online' : 'offline';
    }

    function shortKey(key, length = 28) {
      if (!key) return '';
      if (key.length <= length) return key;
      return `${key.slice(0, length)}...`;
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B','KB','MB','GB','TB'];
      let i = 0;
      let v = bytes;
      while (v >= 1024 && i < units.length - 1) {
        v /= 1024;
        i++;
      }
      return `${v.toFixed(1)} ${units[i]}`;
    }

    load();
    setInterval(load, 3000);
    setInterval(loadTraffic, 30000);
  </script>
</body>
</html>
