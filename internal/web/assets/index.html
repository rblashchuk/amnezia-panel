<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VPN PANEL</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <div class="header">
    <div class="title">VPN PANEL</div>
    <div class="sub">WIREGUARD · LIVE STATS</div>
  </div>

  <div id="grid" class="grid"></div>

  <script>
    async function load() {
      const res = await fetch('/api/peers');
      const data = await res.json();

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      data.forEach(p => {
        const status = getStatus(p.last_handshake);

        const el = document.createElement('div');
        el.className = 'card';

        el.innerHTML = `
          <div class="status ${status}"></div>

          <div class="label">PUBLIC KEY</div>
          <div class="value small">${p.public_key.slice(0, 24)}...</div>

          <div class="metrics">
            <div>
              <div class="label">RX</div>
              <div class="value">${formatBytes(p.rx_bytes)}</div>
            </div>

            <div>
              <div class="label">TX</div>
              <div class="value">${formatBytes(p.tx_bytes)}</div>
            </div>
          </div>

          <div class="footer">
            <div class="label">STATUS</div>
            <div class="value tiny">${status.toUpperCase()}</div>
          </div>
        `;

        grid.appendChild(el);
      });
    }

    function getStatus(lastHandshake) {
      if (!lastHandshake) return 'offline';

      const t = new Date(lastHandshake).getTime();
      if (isNaN(t)) return 'offline';

      const diff = Date.now() - t;
      const minutes = diff / 60000;

      return minutes < 1 ? 'online' : 'offline';
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B','KB','MB','GB','TB'];
      let i = 0;
      let val = bytes;
      while (val >= 1024 && i < units.length - 1) {
        val /= 1024;
        i++;
      }
      return `${val.toFixed(1)} ${units[i]}`;
    }

    load();
    setInterval(load, 3000);
  </script>
</body>
</html>
