<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VPN PANEL</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
  <div class="header">
    <div class="title">VPN PANEL</div>
    <div class="sub">WIREGUARD · LIVE STATS</div>
  </div>

  <div id="list" class="list"></div>

  <script>
    async function load() {
      const res = await fetch('/api/peers');
      const data = await res.json();

      const list = document.getElementById('list');
      list.innerHTML = '';

      data.forEach(p => {
        const status = getStatus(p.last_handshake);

        const el = document.createElement('div');
        el.className = `row ${status}`;

        el.innerHTML = `
          <div class="status-bar ${status}"></div>

          <div class="col key">
            <div class="label">PUBLIC KEY</div>
            <div class="value">${p.public_key.slice(0, 28)}...</div>
          </div>

          <div class="col">
            <div class="label">RX</div>
            <div class="value">${formatBytes(p.rx_bytes)}</div>
          </div>

          <div class="col">
            <div class="label">TX</div>
            <div class="value">${formatBytes(p.tx_bytes)}</div>
          </div>

          <div class="col right">
            <div class="label">STATUS</div>
            <div class="value status-text">${status.toUpperCase()}</div>
          </div>
        `;

        list.appendChild(el);
      });
    }

    function getStatus(lastHandshake) {
      if (!lastHandshake) return 'offline';

      const t = new Date(lastHandshake).getTime();
      if (isNaN(t)) return 'offline';

      const diff = Date.now() - t;
      return diff < 60000 ? 'online' : 'offline';
    }

    function formatBytes(bytes) {
      if (!bytes) return '0 B';
      const units = ['B','KB','MB','GB','TB'];
      let i = 0;
      let v = bytes;
      while (v >= 1024 && i < units.length - 1) {
        v /= 1024;
        i++;
      }
      return `${v.toFixed(1)} ${units[i]}`;
    }

    load();
    setInterval(load, 3000);
  </script>
</body>
</html>
