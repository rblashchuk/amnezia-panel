name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push panel image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: panel
          push: true
          tags: |
            ghcr.io/rblashchuk/amnezia-panel:${{ github.ref_name }}
            ghcr.io/rblashchuk/amnezia-panel:latest

      - name: Build and push collector image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: collector
          push: true
          tags: |
            ghcr.io/rblashchuk/amnezia-panel-collector:${{ github.ref_name }}
            ghcr.io/rblashchuk/amnezia-panel-collector:latest
