name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o vpn-panel-linux-amd64 ./cmd/server

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: vpn-panel-linux-amd64