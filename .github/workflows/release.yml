name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o vpn-panel-linux-amd64 ./cmd/server

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: vpn-panel-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
